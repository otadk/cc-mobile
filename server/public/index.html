<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>cc-mobile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }
    #toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      min-height: 48px;
    }
    #toolbar .title {
      color: #e94560;
      font-weight: 700;
      font-size: 14px;
    }
    #toolbar .status {
      color: #53d769;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #toolbar .dot {
      width: 8px;
      height: 8px;
      background: #53d769;
      border-radius: 50%;
      display: inline-block;
    }
    #toolbar .dot.disconnected { background: #e94560; }
    #terminal-container {
      flex: 1;
      padding: 4px;
      background: #1a1a2e;
    }
    #terminal-container .xterm {
      height: 100%;
      padding: 4px;
    }
    .xterm-viewport::-webkit-scrollbar { width: 4px; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <span class="title">cc-mobile</span>
      <span class="status"><span class="dot" id="status-dot"></span><span id="status-text">connecting</span></span>
    </div>
    <div id="terminal-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>

  <script>
    (function() {
      const term = new Terminal({
        cursorBlink: true,
        cursorStyle: 'bar',
        fontSize: 14,
        fontFamily: '"Cascadia Code", "Fira Code", "JetBrains Mono", "SF Mono", Menlo, monospace',
        theme: {
          background: '#1a1a2e',
          foreground: '#e0e0e0',
          cursor: '#e94560',
          selectionBackground: '#e9456040',
          black: '#16213e',
          brightBlack: '#0f3460',
          red: '#e94560',
          green: '#53d769',
          yellow: '#f5c542',
          blue: '#4a9eff',
          magenta: '#c084fc',
          cyan: '#67e8f9',
          white: '#e0e0e0',
          brightWhite: '#ffffff',
        },
        allowProposedApi: true,
        allowTransparency: false,
        macOptionIsMeta: true,
      });

      const fitAddon = new FitAddon.FitAddon();
      const webLinksAddon = new WebLinksAddon.WebLinksAddon();

      term.loadAddon(fitAddon);
      term.loadAddon(webLinksAddon);

      const container = document.getElementById('terminal-container');
      term.open(container);

      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');

      function updateStatus(connected) {
        if (connected) {
          statusDot.className = 'dot';
          statusText.textContent = 'connected';
        } else {
          statusDot.className = 'dot disconnected';
          statusText.textContent = 'disconnected';
        }
      }

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${proto}://${location.host}/ws`);

        ws.onopen = () => {
          updateStatus(true);
          fitAddon.fit();
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        };

        ws.onmessage = (ev) => {
          term.write(ev.data);
        };

        ws.onclose = () => {
          updateStatus(false);
          setTimeout(connect, 3000);
        };

        ws.onerror = () => {
          ws.close();
        };

        term.onData((data) => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'input', data }));
          }
        });

        term.onResize(({ cols, rows }) => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'resize', cols, rows }));
          }
        });
      }

      let resizeTimer;
      function debouncedFit() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          try { fitAddon.fit(); } catch(e) {}
        }, 100);
      }

      window.addEventListener('resize', debouncedFit);
      window.addEventListener('orientationchange', () => {
        setTimeout(debouncedFit, 300);
      });

      // Initial fit, then connect
      fitAddon.fit();
      connect();

      // Re-fit after fonts load
      document.fonts?.ready.then(() => {
        fitAddon.fit();
      });
    })();
  </script>
</body>
</html>
